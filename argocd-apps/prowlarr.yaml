apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prowlarr
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: prowlarr=linuxserver/prowlarr
    argocd-image-updater.argoproj.io/prowlarr.update-strategy: semver
    argocd-image-updater.argoproj.io/prowlarr.allow-tags: regexp:^\d+\.\d+\.\d+$
spec:
  project: default
  source:
    repoURL: 'https://github.com/pablodelarco/kubernetes-homelab'
    targetRevision: main
    path: apps/media-server/prowlarr
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: media
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
