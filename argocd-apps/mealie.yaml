apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mealie
  namespace: argocd
  # Auto-update disabled: pod runs with :latest tag which re-pulls on
  # restart — no need for Image Updater to rewrite spec. Bump manually
  # by editing the image tag if a specific version is desired.
spec:
  project: default
  source:
    repoURL: 'https://github.com/pablodelarco/kubernetes-homelab'
    targetRevision: main
    path: apps/mealie/manifests
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: mealie
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
