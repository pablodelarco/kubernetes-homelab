apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: node-problem-detector
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/pablodelarco/kubernetes-homelab.git
    targetRevision: main
    path: apps/node-problem-detector/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: node-problem-detector
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
