persistence:
  defaultClass: true
  # Retain by default — prevents data loss when PVCs get
  # deleted/recreated (e.g. ArgoCD force-sync). Orphaned PVs need
  # manual cleanup, which is an acceptable tradeoff for safety.
  reclaimPolicy: Retain
  # Automatically enable default backup group for all new volumes.
  # Group name MUST match the RecurringJob.spec.groups value. The actual
  # RecurringJob 'default-backup' targets group 'default', not 'default-backup'.
  # Mismatch = volumes get wrong label = not picked up by backup schedule.
  recurringJobSelector:
    enable: true
    jobList: '[{"name":"default","isGroup":true}]'

defaultSettings:
  backupTarget: "s3://k8s-backups@us-east-1/"
  backupTargetCredentialSecret: "garage-credentials"
  defaultReplicaCount: 2

service:
  ui:
    type: ClusterIP
    port: 80

# Allow Longhorn to run on control-plane nodes
longhornManager:
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

longhornDriver:
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

longhornUI:
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

# CSI sidecar replicas — match node count (2 nodes = 2 replicas max)
csi:
  attacherReplicaCount: 2
  provisionerReplicaCount: 2
  resizerReplicaCount: 2
  snapshotterReplicaCount: 2
