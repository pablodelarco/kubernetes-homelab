# ArgoCD Image Updater Configuration
# Automatically updates container images and Helm chart versions

config:
  # ArgoCD connection
  argocd:
    grpcWeb: false
    serverAddress: "argocd-server.argocd.svc.cluster.local"
    insecure: false
    plaintext: false

  # Git write-back configuration
  git:
    user: "argocd-image-updater"
    email: "argocd-image-updater@homelab.local"

  # Registries configuration
  registries:
    - name: Docker Hub
      api_url: https://registry-1.docker.io
      ping: yes
      # Anonymous access — rate-limited (~100 pulls/6h per IP) but
      # sufficient for checking tags on ~10 apps daily. Remove this
      # comment and add `credentials: pullsecret:argocd/dockerhub-secret`
      # if rate limits start biting.
      default: yes
    
    - name: GitHub Container Registry
      api_url: https://ghcr.io
      ping: yes
      prefix: ghcr.io
    
    - name: Quay
      api_url: https://quay.io
      ping: yes
      prefix: quay.io

# Extra arguments for the image updater
extraArgs:
  # Check for updates every 24 hours
  - --interval=24h

# Metrics
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: monitoring
    additionalLabels:
      release: monitoring

# Resources
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

# Node affinity - removed to allow scheduling on any available node
# affinity:
#   nodeAffinity:
#     requiredDuringSchedulingIgnoredDuringExecution:
#       nodeSelectorTerms:
#         - matchExpressions:
#             - key: kubernetes.io/hostname
#               operator: In
#               values:
#                 - beelink

# RBAC
serviceAccount:
  create: true

# Log level
logLevel: info

