apiVersion: batch/v1
kind: CronJob
metadata:
  name: recyclarr-sync
  namespace: media
spec:
  # Daily at 04:00 — after nightly maintenance, before morning use
  schedule: "0 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: recyclarr
              image: ghcr.io/recyclarr/recyclarr:6.0.2
              args:
                - sync
                - --config
                - /config/recyclarr.yml
              env:
                - name: TZ
                  value: "Europe/Madrid"
                - name: SONARR_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: recyclarr-api-keys
                      key: SONARR_API_KEY
                - name: RADARR_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: recyclarr-api-keys
                      key: RADARR_API_KEY
              volumeMounts:
                - name: config
                  mountPath: /config
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "50m"
                limits:
                  memory: "512Mi"
                  cpu: "1000m"
          volumes:
            - name: config
              configMap:
                name: recyclarr-config
