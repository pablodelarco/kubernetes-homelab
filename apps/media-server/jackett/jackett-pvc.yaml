apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jackett
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  # Pin to the manually-restored PV from 2025-11-24 DR event.
  # Without this, ArgoCD sees drift between live state (bound to
  # pvc-jackett-restored) and git (no binding) and tries to delete.
  volumeName: pvc-jackett-restored
  resources:
    requests:
      storage: 5Gi