apiVersion: apps/v1
kind: Deployment
metadata:
  name: prowlarr
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prowlarr
  template:
    metadata:
      labels:
        app: prowlarr
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - worker
      containers:
        - name: prowlarr
          image: linuxserver/prowlarr:2.3.5
          env:
            - name: PUID
              value: "65534"
            - name: PGID
              value: "65534"
            - name: TZ
              value: "Europe/Madrid"
            # No HTTP_PROXY: Prowlarr only talks to Byparr (in-cluster) for
            # CF-protected indexers and direct to internet otherwise. The
            # qbitt VPN proxy was conflicting with the Byparr indexer-proxy
            # for 1337x/EZTV — cookies tied to qbitt exit IP couldn't be
            # reused on Prowlarr's follow-up requests.
          volumeMounts:
            - name: config
              mountPath: /config
          ports:
            - containerPort: 9696
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 9696
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 9696
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: prowlarr
